name: documents
version: 0.1.0
description: "Register filesystem files as companion document sources so they can be linked to clients. Calls the companion IPC `documents:register` endpoint over HTTP — the companion owns the PGLite document_sources table. Returns the new document UUID so the agent can hand it to link_document_to_client. Honors the Hermes boundary policy: this plugin never touches PGLite directly."
author: agente
kind: standalone
platforms:
  - linux
  - macos
  - windows
provides_tools:
  - register_document_source
