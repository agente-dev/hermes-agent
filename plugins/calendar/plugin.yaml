name: calendar
version: 0.1.0
description: "Calendar connector — thin subprocess wrapper over the bundled gws (Google Workspace CLI) binary. Read + write Google Calendar events. OAuth + token storage owned entirely by gws; this plugin never touches credentials. Hebrew/RTL titles preserved verbatim."
author: companion
kind: standalone
platforms:
  - linux
  - macos
  - windows
provides_tools:
  - list_calendar_events
  - create_calendar_event
  - get_calendar_event
  - search_calendar_events
  - agenda
  - quick_add_event
  - update_calendar_event
  - delete_calendar_event
  - check_availability
  - list_calendars
