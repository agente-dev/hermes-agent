name: email
version: 0.1.0
description: "Gmail connector — 5 tools (list_emails, read_email, draft_reply, send_email, mark_email) implemented as a thin subprocess wrapper over the bundled `gws` (googleworkspace/cli) binary. OAuth, token storage, and refresh are owned entirely by gws. Resolves the binary via companion-provided GWS bin env with a PATH fallback."
author: NousResearch
kind: backend
scopes:
  - gmail
operator_visible_surface:
  - "Gmail inbox listing"
  - "Read message (raw body preserved for Hebrew/RTL)"
  - "Draft reply"
  - "Send email"
  - "Modify labels (mark read/unread, archive, star)"
provides_tools:
  - list_emails
  - read_email
  - draft_reply
  - send_email
  - mark_email
